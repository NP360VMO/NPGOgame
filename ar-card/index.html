<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Card</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto; background:#0b0b0b; color:#fff; }
    header { padding: 12px 16px; display:flex; gap:10px; align-items:center; }
    .pill { font-size:12px; padding:4px 8px; border:1px solid rgba(255,255,255,.25); border-radius:999px; opacity:.9; }
    .warn { margin: 0 16px 10px; font-size: 13px; opacity:.9; }
    model-viewer { width: 100vw; height: calc(100vh - 64px); background:#0b0b0b; }
    code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <div id="title" style="font-weight:800;">Loading…</div>
    <div class="pill" id="idpill"></div>
  </header>
  <div class="warn" id="warn" style="display:none;"></div>

  <model-viewer id="mv"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    rotation-per-second="20deg"
    shadow-intensity="0"
    interaction-prompt="auto">
  </model-viewer>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id") || "001";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    fetch("./cards.json")
      .then(r => r.json())
      .then(db => {
        const card = db[id];
        if (!card) throw new Error("Card not found: " + id);

        document.getElementById("title").textContent = card.name || "AR Card";
        document.getElementById("idpill").textContent = "ID: " + id;

        const mv = document.getElementById("mv");
        mv.src = card.glb;

        if (isIOS) {
          if (card.usdz && card.usdz.trim().length > 0) {
            mv.setAttribute("ios-src", card.usdz);
          } else {
            document.getElementById("warn").style.display = "block";
            document.getElementById("warn").innerHTML =
              "iPhone 要開 AR（Quick Look）需要 <b>.usdz</b> 檔。你而家仍然可以喺頁面旋轉睇 3D 預覽。<br/>" +
              "完成 usdz 後，將檔放入 <code>ar-card/models/</code>，再喺 <code>cards.json</code> 填入 <code>usdz</code> 路徑即可。";
          }
        }
      })
      .catch(err => {
        document.getElementById("title").textContent = "無效卡片 / 連結錯誤";
        document.getElementById("warn").style.display = "block";
        document.getElementById("warn").textContent = err.message;
        console.error(err);
      });
  </script>
</body>
</html>
